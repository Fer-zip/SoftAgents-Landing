<svg width="100%" height="100%" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Filtro de Neón Cyberpunk -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur3" />
      <feMerge>
        <feMergeNode in="blur3" />
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Animaciones -->
    <style>
      .cortex-fold {
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      
      /* Animaciones de pulsos sinápticos viajando por los surcos */
      .synapse-pulse {
        stroke-dasharray: 15, 350;
        animation: flow-fast 3s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
        opacity: 1;
      }
      .synapse-pulse-med {
        stroke-dasharray: 20, 400;
        animation: flow-med 4s ease-in-out infinite;
        opacity: 0.9;
      }
      .synapse-pulse-slow {
        stroke-dasharray: 10, 300;
        animation: flow-slow 5s linear infinite;
        opacity: 0.8;
      }

      @keyframes flow-fast { 0% { stroke-dashoffset: 365; } 100% { stroke-dashoffset: 0; } }
      @keyframes flow-med { 0% { stroke-dashoffset: 420; } 100% { stroke-dashoffset: 0; } }
      @keyframes flow-slow { 0% { stroke-dashoffset: 310; } 100% { stroke-dashoffset: 0; } }

      /* Nodos neuronales destellando */
      .neuron-node {
        animation: pulse-node 2.5s infinite alternate;
      }
      .neuron-node:nth-child(odd) {
        animation-duration: 3.2s;
        animation-delay: 1s;
      }
      @keyframes pulse-node {
        0%, 70% { opacity: 0.1; r: 1.5px; filter: brightness(0.8); }
        100% { opacity: 1; r: 3.5px; filter: brightness(2); box-shadow: 0 0 10px #00ffff; }
      }
    </style>
  </defs>

  <g stroke="#00ffff" filter="url(#neonGlow)">
    
    <!-- ================= HEMISFERIO IZQUIERDO ================= -->
    <g class="cortex-fold">
      <!-- Contorno anatómico principal MÁS ONDULADO Y "NUBOSO" -->
      <!-- Se añadieron más puntos de control C (Curvas Bezier) para crear los pliegues externos -->
      <path d="M 242 45 
               C 190 35, 140 45, 110 80 
               C 80 115, 60 140, 50 170
               C 40 200, 30 240, 45 280
               C 60 320, 50 360, 80 400
               C 110 440, 160 470, 210 465 
               C 230 460, 240 400, 242 250 
               C 244 150, 245 80, 242 45 Z" 
            stroke-width="3" opacity="0.8"/>
            
      <!-- Textura de surcos cerebrales profundos (Contenidos ESTRICTAMENTE dentro del contorno) -->
      <g stroke-width="1.2" opacity="0.35">
        <!-- Lóbulo Frontal -->
        <path d="M 235 70 C 200 60 150 80 120 95 C 90 110 100 130 85 150" />
        <path d="M 238 100 C 210 110 170 80 140 120 C 110 160 130 180 90 185 C 75 188 80 210 65 220" />
        <path d="M 190 55 C 160 65 140 95 120 125" />
        
        <!-- Surco Central y adyacentes (Corteza Motora/Sensorial) -->
        <path d="M 235 140 C 180 145 160 210 110 220 C 70 230 80 250 60 260" />
        <path d="M 230 180 C 200 170 160 240 130 255 C 90 275 100 290 60 300" />
        <path d="M 180 145 C 160 180 150 200 170 240" />

        <!-- Lóbulo Parietal / Temporal -->
        <path d="M 235 230 C 180 220 170 290 130 310 C 90 330 100 350 75 365" />
        <path d="M 238 280 C 200 280 170 330 140 350 C 110 370 130 390 90 410" />
        <path d="M 180 240 C 160 270 150 300 170 340" />

        <!-- Lóbulo Occipital -->
        <path d="M 240 330 C 190 340 160 390 130 430 C 120 445 140 450 160 455" />
        <path d="M 235 380 C 200 390 170 430 180 445" />
        <path d="M 130 350 C 110 380 100 410 120 435" />
        
        <!-- Conexiones adicionales para mayor densidad -->
        <path d="M 110 90 C 130 130 110 160 130 180" />
        <path d="M 110 220 C 130 250 110 280 130 310" />
        <path d="M 140 350 C 160 380 130 410 130 430" />
      </g>

      <!-- Vías Sinápticas (Las luces que viajan por los surcos) -->
      <path d="M 235 70 C 200 60 150 80 120 95 C 90 110 100 130 85 150" stroke-width="2" class="synapse-pulse" style="animation-delay: 0s;"/>
      <path d="M 230 180 C 200 170 160 240 130 255 C 90 275 100 290 60 300" stroke-width="2.5" class="synapse-pulse-med" style="animation-delay: 1.5s;"/>
      <path d="M 238 280 C 200 280 170 330 140 350 C 110 370 130 390 90 410" stroke-width="2" class="synapse-pulse-slow" style="animation-delay: 0.8s;"/>
      <path d="M 240 330 C 190 340 160 390 130 430" stroke-width="2" class="synapse-pulse" style="animation-delay: 2.5s;"/>
    </g>


    <!-- ================= HEMISFERIO DERECHO ================= -->
    <g class="cortex-fold">
      <!-- Contorno anatómico principal MÁS ONDULADO Y "NUBOSO" -->
      <!-- Simétrico al izquierdo, pero manteniendo la irregularidad orgánica -->
      <path d="M 258 45 
               C 310 35, 360 45, 390 80 
               C 420 115, 440 140, 450 170
               C 460 200, 470 240, 455 280
               C 440 320, 450 360, 420 400
               C 390 440, 340 470, 290 465 
               C 270 460, 260 400, 258 250 
               C 256 150, 255 80, 258 45 Z" 
            stroke-width="3" opacity="0.8"/>

      <!-- Textura de surcos cerebrales profundos (Contenidos ESTRICTAMENTE dentro) -->
      <g stroke-width="1.2" opacity="0.35">
        <!-- Lóbulo Frontal -->
        <path d="M 265 70 C 300 60 350 80 380 95 C 410 110 400 130 415 150" />
        <path d="M 262 100 C 290 110 330 80 360 120 C 390 160 370 180 410 185 C 425 188 420 210 435 220" />
        <path d="M 310 55 C 340 65 360 95 380 125" />
        
        <!-- Surco Central -->
        <path d="M 265 140 C 320 145 340 210 390 220 C 430 230 420 250 440 260" />
        <path d="M 270 180 C 300 170 340 240 370 255 C 410 275 400 290 440 300" />
        <path d="M 320 145 C 340 180 350 200 330 240" />

        <!-- Lóbulo Parietal / Temporal -->
        <path d="M 265 230 C 320 220 330 290 370 310 C 410 330 400 350 425 365" />
        <path d="M 262 280 C 300 280 330 330 360 350 C 390 370 370 390 410 410" />
        <path d="M 320 240 C 340 270 350 300 330 340" />

        <!-- Lóbulo Occipital -->
        <path d="M 260 330 C 310 340 340 390 370 430 C 380 445 360 450 340 455" />
        <path d="M 265 380 C 300 390 330 430 320 445" />
        <path d="M 370 350 C 390 380 400 410 380 435" />
        
        <!-- Conexiones adicionales -->
        <path d="M 390 90 C 370 130 390 160 370 180" />
        <path d="M 390 220 C 370 250 390 280 370 310" />
        <path d="M 360 350 C 340 380 370 410 370 430" />
      </g>

      <!-- Vías Sinápticas -->
      <path d="M 262 100 C 290 110 330 80 360 120 C 390 160 370 180 410 185" stroke-width="2" class="synapse-pulse-med" style="animation-delay: 0.5s;"/>
      <path d="M 265 140 C 320 145 340 210 390 220 C 430 230 420 250 440 260" stroke-width="2.5" class="synapse-pulse" style="animation-delay: 2.2s;"/>
      <path d="M 265 230 C 320 220 330 290 370 310 C 410 330 400 350 425 365" stroke-width="2" class="synapse-pulse-slow" style="animation-delay: 1.1s;"/>
      <path d="M 260 330 C 310 340 340 390 370 430" stroke-width="2" class="synapse-pulse-med" style="animation-delay: 3s;"/>
    </g>

    <!-- ================= NODOS NEURONALES (Puntos reposicionados al interior) ================= -->
    <g fill="#ffffff" stroke="none">
      <!-- Izquierda -->
      <circle cx="85" cy="150" class="neuron-node" />
      <circle cx="110" cy="90" class="neuron-node" />
      <circle cx="130" cy="255" class="neuron-node" />
      <circle cx="60" cy="260" class="neuron-node" />
      <circle cx="140" cy="350" class="neuron-node" />
      <circle cx="90" cy="410" class="neuron-node" />
      <circle cx="130" cy="430" class="neuron-node" />
      
      <!-- Derecha -->
      <circle cx="415" cy="150" class="neuron-node" />
      <circle cx="410" cy="185" class="neuron-node" />
      <circle cx="390" cy="220" class="neuron-node" />
      <circle cx="440" cy="260" class="neuron-node" />
      <circle cx="370" cy="310" class="neuron-node" />
      <circle cx="425" cy="365" class="neuron-node" />
      <circle cx="370" cy="430" class="neuron-node" />
      
      <!-- Nodos en el cuerpo calloso (centro) -->
      <circle cx="250" cy="110" class="neuron-node" style="animation-delay: 0.2s;" />
      <circle cx="250" cy="210" class="neuron-node" style="animation-delay: 1.5s;" />
      <circle cx="250" cy="310" class="neuron-node" style="animation-delay: 0.8s;" />
      <circle cx="250" cy="410" class="neuron-node" style="animation-delay: 2.1s;" />
    </g>
    
  </g>
</svg>